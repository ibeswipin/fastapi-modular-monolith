# Inside the compose network, containers reach each other by service name,
# not "localhost" — .env (used as-is for local, non-Docker dev) points at
# localhost, so these overrides win over env_file for the 4 services below.
x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/users_api
  REDIS_URL: redis://redis:6379/2
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Applies migrations then exits; app/worker/beat wait on it.
  migrate:
    build: .
    env_file: .env
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  app:
    build: .
    env_file: .env
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app  # for --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s

  worker:
    build: .
    env_file: .env
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      start_period: 10s

  beat:
    build: .
    env_file: .env
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # --schedule points beat's local state file at /tmp — /app is owned by
    # root (copied in before the Dockerfile switches to appuser), so the
    # default ./celerybeat-schedule path isn't writable by the container's user.
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]

volumes:
  postgres_data:
